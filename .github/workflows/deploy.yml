cat > .github/workflows/deploy.yml << 'EOF'
name: Deploy Frontend to S3 + CloudFront

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Write .env.production
        run: |
          cat > .env.production <<EOF2
          VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          VITE_AUTH_PROVIDER=cognito
          VITE_COGNITO_USER_POOL_ID=${{ vars.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID=${{ vars.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REGION=${{ vars.VITE_COGNITO_REGION }}
          VITE_STRIPE_PUBLISHABLE_KEY=${{ vars.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_S3_IMAGES_BASE_URL=${{ vars.VITE_S3_IMAGES_BASE_URL }}
          VITE_LEX_BOT_ID=${{ vars.VITE_LEX_BOT_ID }}
          VITE_LEX_BOT_ALIAS_ID=${{ vars.VITE_LEX_BOT_ALIAS_ID }}
          VITE_LEX_LOCALE_ID=en_US
          EOF2

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ca-central-1

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ vars.FRONTEND_BUCKET }}/ --delete \
            --cache-control 'max-age=31536000,immutable' --exclude 'index.html'
          aws s3 cp dist/index.html s3://${{ vars.FRONTEND_BUCKET }}/index.html \
            --cache-control 'no-cache,no-store,must-revalidate'

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DIST_ID }} \
            --paths '/*'
EOF